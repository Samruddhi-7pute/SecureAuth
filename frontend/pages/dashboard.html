<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SecureAuth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
</head>
<body>

  <div class="page-loader" id="pageLoader">
    <div class="spinner"></div>
    <p class="text-muted">Loading...</p>
  </div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">S</span>
        SecureAuth
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <button data-logout-btn>Log out</button>
      </div>
    </div>
  </nav>

  <main class="page-inner">
    <div class="page-header">
      <h1>Welcome back, <span id="welcomeName">...</span></h1>
      <p>Here's a quick look at your account.</p>
    </div>

    <div class="card">
      <div class="summary-card">
        <div class="avatar-circle" id="avatarInitials">?</div>
        <div>
          <div class="summary-name" id="summaryName">—</div>
          <div class="summary-email" id="summaryEmail">—</div>
        </div>
      </div>

      <ul class="info-list">
        <li>
          <span>Email</span>
          <span id="infoEmail">—</span>
        </li>
        <li>
          <span>Last login</span>
          <span id="infoLastLogin">—</span>
        </li>
        <li>
          <span>Member since</span>
          <span id="infoMemberSince">—</span>
        </li>
      </ul>
    </div>
  </main>

  <footer class="footer">
    &copy; <span id="year"></span> SecureAuth
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/main.js"></script>
  <script src="../scripts/dashboard.js"></script>
</body>
</html>
