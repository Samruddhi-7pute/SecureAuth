<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — SecureAuth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/auth.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">S</span>
        SecureAuth
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="login.html" data-guest-link>Log in</a>
        <a href="signup.html" data-guest-link class="btn-nav-primary">Sign up</a>
        <a href="dashboard.html" data-auth-link style="display:none;">Dashboard</a>
        <a href="profile.html" data-auth-link style="display:none;">Profile</a>
        <button data-logout-btn data-auth-link style="display:none;">Log out</button>
      </div>
    </div>
  </nav>

  <main class="center-screen">
    <div class="auth-wrapper animate-in">
      <div class="card">
        <div class="auth-header">
          <span class="brand-mark">S</span>
          <h1>Create your account</h1>
          <p>Start in under a minute</p>
        </div>

        <div id="signupAlert" class="alert" role="alert"></div>

        <form id="signupForm" novalidate>
          <div class="form-group">
            <label for="name">Full name</label>
            <div class="input-wrapper">
              <input type="text" id="name" name="name" placeholder="Jane Doe" autocomplete="name" required />
            </div>
            <span class="field-error" id="nameError"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password" required />
              <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="passwordError"></span>

            <div class="strength-meter" id="strengthMeter">
              <div class="strength-bars">
                <span></span><span></span><span></span><span></span>
              </div>
              <span class="strength-label" id="strengthLabel">Password strength</span>
            </div>
            <span class="field-hint">8+ characters, with uppercase, lowercase, a number, and a symbol.</span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm password</label>
            <div class="input-wrapper">
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" required />
              <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Show password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="confirmPasswordError"></span>
          </div>

          <button type="submit" class="btn btn-primary" id="signupBtn">Create account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
      </div>
    </div>
  </main>

  <script src="scripts/utils.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/main.js"></script>
  <script src="scripts/signup.js"></script>
</body>
</html>
